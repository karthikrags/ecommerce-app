{% extends "base.html" %}
{% block content %}

{% if ads %}
<div class="row mb-3">
  {% for ad in ads %}
  <div class="col-md-6">
    <div class="ad-banner mb-2">
      📢 <a href="{{ ad.redirect_url }}">{{ ad.text }}</a>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}

<h2 class="mb-4">All Products</h2>
<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
  {% for item in products %}
  <div class="col">
    <div class="card h-100 product-card">
      <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{ item.product.name }}</h5>
        <p class="card-text text-muted small flex-grow-1">{{ item.product.description[:80] }}…</p>
        <div class="d-flex justify-content-between align-items-center mt-2">
          <span class="fw-bold text-success">{{ item.price }}</span>
          <a href="/product/{{ item.product.id }}" class="btn btn-sm btn-primary">View</a>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
