<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Boutique</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .product-card { transition: transform .15s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .ad-banner { background: #fff3cd; border-left: 4px solid #ffc107; padding: .5rem 1rem; border-radius: 4px; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">🛍 Online Boutique</a>
    <div class="d-flex align-items-center gap-3">
      <!-- Search -->
      <form class="d-flex" action="/search" method="get">
        <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="Search products…" />
        <button class="btn btn-outline-light btn-sm" type="submit">Search</button>
      </form>
      <!-- Currency switcher -->
      <form action="/currency" method="post" class="d-flex align-items-center">
        <select name="currency" class="form-select form-select-sm me-1" onchange="this.form.submit()">
          {% for c in currencies %}
          <option value="{{ c }}" {% if c == current_currency %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </form>
      <!-- Cart -->
      <a href="/cart" class="btn btn-outline-light btn-sm position-relative">
        🛒 Cart
        {% if cart_size > 0 %}
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
          {{ cart_size }}
        </span>
        {% endif %}
      </a>
    </div>
  </div>
</nav>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted py-4 mt-5 border-top">
  <small>Online Boutique – Python Microservices Demo</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
