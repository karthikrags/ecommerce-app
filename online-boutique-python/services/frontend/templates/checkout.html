{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Checkout</h2>
<form action="/checkout" method="post">
  <div class="row g-4">
    <!-- Shipping Address -->
    <div class="col-md-6">
      <div class="card">
        <div class="card-header fw-bold">Shipping Address</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required placeholder="you@example.com" />
          </div>
          <div class="mb-3">
            <label class="form-label">Street Address</label>
            <input type="text" name="street_address" class="form-control" required placeholder="123 Main St" />
          </div>
          <div class="row">
            <div class="col mb-3">
              <label class="form-label">City</label>
              <input type="text" name="city" class="form-control" required />
            </div>
            <div class="col mb-3">
              <label class="form-label">State</label>
              <input type="text" name="state" class="form-control" />
            </div>
          </div>
          <div class="row">
            <div class="col mb-3">
              <label class="form-label">ZIP Code</label>
              <input type="text" name="zip_code" class="form-control" required />
            </div>
            <div class="col mb-3">
              <label class="form-label">Country</label>
              <input type="text" name="country" class="form-control" value="US" required />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Payment -->
    <div class="col-md-6">
      <div class="card">
        <div class="card-header fw-bold">Payment</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Card Number</label>
            <input type="text" name="credit_card_number" class="form-control" required
                   placeholder="4111 1111 1111 1111" maxlength="19" />
          </div>
          <div class="row">
            <div class="col mb-3">
              <label class="form-label">CVV</label>
              <input type="text" name="credit_card_cvv" class="form-control" required
                     placeholder="123" maxlength="4" />
            </div>
            <div class="col mb-3">
              <label class="form-label">Exp. Month</label>
              <input type="number" name="credit_card_expiration_month" class="form-control"
                     min="1" max="12" required placeholder="12" />
            </div>
            <div class="col mb-3">
              <label class="form-label">Exp. Year</label>
              <input type="number" name="credit_card_expiration_year" class="form-control"
                     min="2025" max="2035" required placeholder="2027" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-4">
    <button type="submit" class="btn btn-success btn-lg">Place Order</button>
    <a href="/cart" class="btn btn-outline-secondary btn-lg ms-2">Back to Cart</a>
  </div>
</form>

{% endblock %}
